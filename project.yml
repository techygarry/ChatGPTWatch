name: ChatGPTWatch
options:
  bundleIdPrefix: com.adsol
  deploymentTarget:
    watchOS: "11.0"
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  ChatGPTWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - WatchApp
      - Shared
    settings:
      base:
        INFOPLIST_FILE: WatchApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: WatchApp/Resources/Entitlements/ChatGPTWatch.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.adsol.chatgptwatch.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        PRODUCT_NAME: ChatGPT Watch
    dependencies:
      - target: ChatGPTWatchWidgets

  ChatGPTWatchWidgets:
    type: app-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - Widgets
      - Shared
    settings:
      base:
        INFOPLIST_FILE: Widgets/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.adsol.chatgptwatch.watchkitapp.widgets
        GENERATE_INFOPLIST_FILE: false
        PRODUCT_NAME: ChatGPT Widgets

  ChatGPTCompanion:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - CompanionApp
      - Shared
    settings:
      base:
        INFOPLIST_FILE: CompanionApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: CompanionApp/Resources/Entitlements/CompanionApp.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.adsol.chatgptwatch
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        PRODUCT_NAME: ChatGPT Watch

schemes:
  ChatGPTWatch:
    build:
      targets:
        ChatGPTWatch: all
        ChatGPTWatchWidgets: all
    run:
      config: Debug
      targets:
        - ChatGPTWatch

  ChatGPTCompanion:
    build:
      targets:
        ChatGPTCompanion: all
    run:
      config: Debug
      targets:
        - ChatGPTCompanion
